start:
  welcome: |
    Здравствуйте! Я помогаю не забывать о днях рождения коллег и при желании собирать отдельный чат для поздравления — без именинника.

    Чтобы подключиться, укажите имя, фамилию, дату рождения и команду, в которой вы работаете. Все напоминания приходят сюда, в личные сообщения.

  button_start: "Начать регистрацию"

registration:
  ask_first_name: "Как вас зовут? Напишите имя."
  ask_last_name: "Спасибо, {first_name}! Теперь напишите фамилию."
  ask_birth_date: |
    Когда у вас день рождения?

    Напишите дату в формате ДД.ММ (например, 15.03). Год указывать не нужно.
  invalid_date: "Не удалось распознать дату. Пожалуйста, напишите в формате ДД.ММ — например, 07.11."
  ask_team: "В какой команде вы работаете? Напишите название одним сообщением — например: Исследования."
  complete: |
    Отлично, вы в списке!

    • {first_name} {last_name}
    • День рождения: {birth_date_display}
    • Команда: {team}

    За 7 дней до дня рождения коллеги я напомню вам в личку (в свой день рождения такое напоминание не приходит). При желании можно создать отдельный поздравительный чат.

    Изменить данные: /profile

profile:
  view: |
    Ваши данные:

    • {first_name} {last_name}
    • День рождения: {birth_date_display}
    • Команда: {team}

    Что изменить?
  saved: "Сохранено."
  button_first_name: "Имя"
  button_last_name: "Фамилия"
  button_birth_date: "Дату"
  button_team: "Команду"

reminder:
  week_before: |
    Скоро день рождения у коллеги 🎂

    {full_name} · {username_display}
    {birth_date_display} · команда «{team}»

    Через неделю у {first_name} праздник — если хотите, можно заранее спланировать поздравление. Для этого есть отдельный чат: именинник туда не добавляется.

    Если вы ближе всех общаетесь с {first_name} — будем рады, если возьмёте на себя создание чата. Если нет — просто знайте, что повод уже на подходе 🙂

  chat_exists: |
    Поздравительный чат для {full_name} ({birth_date_display}) уже есть.

    Создал(а): {initiator_username_display}
    Вступить: {invite_link}

  no_chat_day_minus_6: |
    Небольшое напоминание: через 6 дней день рождения у {full_name} · {username_display} ({birth_date_display}, команда «{team}»).

    Задач обычно много — легко отложить «на потом». Но если получится создать поздравительный чат, коллеге будет по-настоящему приятно: можно спокойно договориться о поздравлении, а {first_name} в чат не попадёт.

    Займёт пару минут — будем благодарны, если возьмётесь 💛

  no_chat_day_minus_4: |
    Через 4 дня праздник у {full_name} · {username_display} — поздравительного чата пока нет.

    Понимаем, что дел хватает и о таком легко забыть. Если найдётся минутка — создайте чатик: для {first_name} это знак, что о нём/ней помнят. Именинник в группу не добавляется.

  no_chat_day_minus_2: |
    Послезавтра праздник у {full_name} · {username_display}!

    Чата для поздравления пока нет — без него сложнее договориться о подарке и сюрпризе. Задач много, мы в курсе — но если чатик появится сейчас, у коллеги останется время подготовиться, и это правда приятно.

    Пожалуйста, не забудьте создать чатик — коллеге будет очень рад(а) 🎂

  not_joined: |
    Уже послезавтра день рождения у {full_name} · {username_display} ({birth_date_display}, команда «{team}»).

    {initiator_username_display} создал(а) поздравительный чат — вы ещё не вступили. Если хотите поучаствовать в поздравлении, загляните по ссылке:

    {invite_link}

    Пожалуйста, не пересылайте ссылку {first_name} и не добавляйте в группу вручную.

  button_create_chat: "Создать поздравительный чат"
  button_join_chat: "Вступить в чат"

initiator:
  instructions: |
    Вы создаёте поздравительный чат для {full_name} · {username_display} ({birth_date_display}, команда «{team}»).

    Пожалуйста, сделайте по шагам:

    1️⃣ Создайте новую группу в Telegram (например: «Поздравление {first_name} · {birth_date_short}»).

    2️⃣ Добавьте в группу бота {bot_username}.

    3️⃣ Назначьте бота администратором с правом приглашать пользователей по ссылке.

    4️⃣ В этой группе отправьте команду:
    /done

    После этого я отправлю ссылку всем, кто зарегистрирован в боте, кроме {first_name}. Вступят те, кто захочет.

    ⏱ На создание — 12 часов. Если не успеете, кнопку сможет нажать другой коллега.

  success: |
    Готово! Поздравительный чат для {full_name} создан.

    Ссылку отправила всем зарегистрированным коллегам, кроме именинника.

    Ваша ссылка:
    {invite_link}

    Пожалуйста, не пересылайте её {first_name} и не добавляйте именинника в группу вручную.

  wrong_user: "Завершить создание может только инициатор — {initiator_username_display}."
  no_pending: "Сейчас нет активного создания чата. Нажмите «Создать поздравительный чат» в напоминании за неделю до дня рождения."
  no_admin_rights: "Нужны права администратора: приглашать пользователей по ссылке. Назначьте их боту {bot_username} и снова отправьте /done в этой группе."
  cancelled: "Создание чата отменено. Кнопку «Создать поздравительный чат» может нажать другой коллега."
  timeout: "Время на создание чата для {full_name} истекло (12 часов). Если чат ещё актуален — снова нажмите «Создать поздравительный чат» в напоминании."
  already_created: |
    Поздравительный чат для {full_name} уже создан коллегой {initiator_username_display}.

    Вступить: {invite_link}

  button_cancel: "Отмена"

broadcast:
  chat_link: |
    {initiator_username_display} создал(а) поздравительный чат для {full_name} · {username_display} ({birth_date_display}, команда «{team}»).

    Если хотите поучаствовать в поздравлении — вступите по ссылке:
    {invite_link}

    Именинник в чат не приглашается. Пожалуйста, не пересылайте ссылку {first_name} и не добавляйте её в группу вручную.

birthday:
  congrats_a: |
    🎉 {first_name}, сегодня ваш день!

    С днём рождения от всего бота — пусть день будет лёгким, а год принесёт то, о чём вы давно мечтали (и пару приятных сюрпризов по пути).

    Празднуйте на полную — вы это заслужили! ✨

  congrats_b: |
    Сегодня ваш день, {first_name}! 🎂

    Пусть вокруг будут люди, которые радуются вместе с вами, а впереди — только хорошие новости.

    С днём рождения! 💛

  congrats_c: |
    🚨 Внимание: сегодня официально день рождения {first_name} {last_name}!

    Калории в праздник не считаются, желания загаданные сбываются, а настроение — выше облаков.

    С праздником! 🥳

common:
  need_start: "Напишите мне в личку: {bot_link}, нажмите Start и пройдите короткую регистрацию — тогда будут приходить напоминания и ссылки на чаты."
  need_registration: "Сначала завершите регистрацию: /start"
  help: |
    Я напоминаю за 7 дней о днях рождения коллег и при необходимости — через день, если чат ещё не создан. За 2 дня напоминаю о чате, если вы не вступили. Помогаю создать отдельный чат (именинник туда не попадает).

    Команды:
    /start — регистрация
    /profile — изменить данные
    /help — справка

    Напоминания только в личных сообщениях.
