# Render Free = Web Service (Worker на Free больше нет)
services:
  - type: web
    name: birthday-telegram-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: USE_WEBHOOK
        value: "true"
      - key: TIMEZONE
        value: Europe/Moscow
      - key: REMINDER_HOUR
        value: "11"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: CRON_SECRET
        sync: false
